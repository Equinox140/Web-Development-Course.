<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="form.css">
</head>

<body>
    <h1>Student Registration Form.</h1>
    <div>
        <label>Students Full Name - </label>
        <input type="text" name="fullname" required placeholder="Enter your fullname." class="input">
    </div>
    <br />
    <div>
        <label>Age - </label>
        <input type="date" class="input">

    </div>
    <br />
    <div>
        <lable>Email - </lable>
        <input type="text" name="Email" required placeholder="Enter your Email.">
    </div>
    <br />
    <div>
        <label>Phone Number - </label>
        <input type="text" name="Phone number" required placeholder="Enter your phone number." class="input">

    </div>
    <br />
    <div>
        <label>Gender - </label>
        <input type="radio" name="Gender" value="Male" class="input">Male
        <input type="radio" name="Gender" value="Female" class="input">Female

    </div>
    <br />

    <div>
        <label>Course - </label>
        <select name="Course" class="input">
            <option> Computer Engineering</option>
            <option> Cybersecurity</option>
            <option> Electronics and Telecomunication</option>
            <option> Mechanical Engineering </option>
            <option> Civil Engineering </option>
        </select>
    </div>
    <br />

    <div>
        <label>Hobbies and Interests - </label>
        <br />

        <textarea rows="2" cols="34" placeholder="Enter Here"></textarea class="input">


    </div>






</body>

</html>
